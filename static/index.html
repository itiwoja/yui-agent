<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yui</title>
<style>
  :root {
    --bg: #0f1115;
    --text: #e7e9ee;
    --sub: #8b93a7;
    --accent: #6ea8ff;
    --listening: #4fd18b;
    --speaking: #6ea8ff;
    --thinking: #c99bff;
    --end: #e05a5a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.08em; color: var(--sub); margin: 0; }

  #orb {
    width: 168px;
    height: 168px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2a3040, #12141a);
    border: 2px solid #262b36;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    transition: border-color 300ms ease, box-shadow 300ms ease, transform 300ms ease;
  }
  #orb.listening { border-color: var(--listening); box-shadow: 0 0 40px rgba(79, 209, 139, 0.25); animation: breathe 1.6s ease-in-out infinite; }
  #orb.thinking { border-color: var(--thinking); box-shadow: 0 0 40px rgba(201, 155, 255, 0.25); animation: spin 2.2s linear infinite; }
  #orb.speaking { border-color: var(--speaking); box-shadow: 0 0 40px rgba(110, 168, 255, 0.3); animation: pulse 0.9s ease-in-out infinite; }

  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  #status { font-size: 14px; color: var(--sub); min-height: 20px; }

  #callBtn {
    background: var(--accent);
    color: #0b0e14;
    border: none;
    border-radius: 999px;
    padding: 14px 36px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  #callBtn.active { background: var(--end); color: #fff; }
  #callBtn:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <h1>YUI</h1>
  <div id="orb">🎧</div>
  <div id="status">通話ボタンを押して話しかけてください</div>
  <button id="callBtn" type="button">通話をはじめる</button>

<script>
const orb = document.getElementById('orb');
const statusEl = document.getElementById('status');
const callBtn = document.getElementById('callBtn');

const sessionId = (() => {
  const key = 'yui_session_id';
  let id = localStorage.getItem(key);
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem(key, id);
  }
  return id;
})();

const SILENCE_MS = 1100;
const MIN_SPEECH_MS = 500;
const MAX_RECORD_MS = 20000;
const VOICE_THRESHOLD = 14;

let callActive = false;
let stream = null;
let audioCtx = null;
let analyser = null;
let vadTimer = null;
let mediaRecorder = null;
let recordedChunks = [];
let speechStartedAt = null;
let lastVoiceAt = null;
let maxRecordTimer = null;
let currentAudio = null;

function setState(state) {
  orb.classList.remove('listening', 'thinking', 'speaking');
  if (state === 'listening') {
    orb.textContent = '🎙️';
    orb.classList.add('listening');
    statusEl.textContent = 'お話しください…';
  } else if (state === 'thinking') {
    orb.textContent = '💭';
    orb.classList.add('thinking');
    statusEl.textContent = 'ゆいが考えています…';
  } else if (state === 'speaking') {
    orb.textContent = '💬';
    orb.classList.add('speaking');
    statusEl.textContent = 'ゆいが話しています…';
  } else {
    orb.textContent = '🎧';
    statusEl.textContent = callActive ? '接続中…' : '通話ボタンを押して話しかけてください';
  }
}

function stopVadWatch() {
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  if (maxRecordTimer) { clearTimeout(maxRecordTimer); maxRecordTimer = null; }
}

function startVadWatch() {
  const data = new Uint8Array(analyser.fftSize);
  speechStartedAt = Date.now();
  lastVoiceAt = null;

  vadTimer = setInterval(() => {
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = data[i] - 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);

    const elapsed = Date.now() - speechStartedAt;
    if (rms > VOICE_THRESHOLD) {
      lastVoiceAt = Date.now();
    }
    if (lastVoiceAt && elapsed > MIN_SPEECH_MS && (Date.now() - lastVoiceAt) > SILENCE_MS) {
      stopRecording();
    }
  }, 100);

  maxRecordTimer = setTimeout(() => stopRecording(), MAX_RECORD_MS);
}

async function startListening() {
  if (!callActive) return;
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = async () => {
    stopVadWatch();
    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
    if (blob.size < 2000) {
      if (callActive) startListening();
      return;
    }
    await handleTurn(blob);
  };
  mediaRecorder.start();
  setState('listening');
  startVadWatch();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

async function handleTurn(blob) {
  setState('thinking');
  try {
    const transcribeRes = await fetch('/transcribe', {
      method: 'POST',
      headers: { 'Content-Type': 'audio/webm' },
      body: blob,
    });
    const transcribeData = await transcribeRes.json();
    const text = (transcribeData.text || '').trim();
    if (!text) {
      if (callActive) startListening();
      return;
    }

    const chatRes = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text }),
    });
    const chatData = await chatRes.json();
    if (!chatRes.ok || !chatData.reply) {
      if (callActive) startListening();
      return;
    }

    await speakAndWait(chatData.reply);
  } catch (err) {
    // 通信エラーでも通話は切らず、次の発話を待つ
  } finally {
    if (callActive) startListening();
  }
}

function speakAndWait(text) {
  return new Promise(async (resolve) => {
    setState('speaking');
    try {
      const res = await fetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) return resolve();
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.onended = () => resolve();
      currentAudio.onerror = () => resolve();
      await currentAudio.play();
    } catch (err) {
      resolve();
    }
  });
}

async function startCall() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    statusEl.textContent = 'マイクへのアクセスが許可されていません';
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  callActive = true;
  callBtn.textContent = '通話をおわる';
  callBtn.classList.add('active');
  startListening();
}

function endCall() {
  callActive = false;
  stopVadWatch();
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  callBtn.textContent = '通話をはじめる';
  callBtn.classList.remove('active');
  setState('idle');
}

callBtn.addEventListener('click', () => {
  callBtn.disabled = true;
  (callActive ? Promise.resolve(endCall()) : startCall()).finally(() => {
    callBtn.disabled = false;
  });
});

setState('idle');
</script>
</body>
</html>
