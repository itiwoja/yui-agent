name: CI/CD to Cloud Run

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (runtime + dev)
        run: python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile Python sources
        run: python -m compileall .

      - name: Run tests
        run: pytest -q

  deploy:
    name: Deploy to Cloud Run
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy canary revision
        run: >-
          gcloud run deploy yui-agent
          --source .
          --region asia-northeast1
          --project yui-agent-2026
          --allow-unauthenticated
          --set-secrets=YUI_APP_TOKEN=yui-app-token:latest
          --no-traffic
          --tag=canary
          --quiet

      - name: Smoke test canary
        run: |
          # describe に --filter は使えず、per-entry url は「タグ付きエントリ」だけに入る。
          # flatten + CSV で (tag,url) を出し、tag=canary の行の url を取り出す（堅牢）。
          CANARY_URL="$(gcloud run services describe yui-agent \
            --region asia-northeast1 \
            --project yui-agent-2026 \
            --flatten='status.traffic[]' \
            --format='csv[no-heading](status.traffic.tag,status.traffic.url)' \
            | awk -F, '$1=="canary"{print $2}')"
          # URLが取れなければ移行せずに失敗させる（旧リビジョンが100%のまま＝安全）。
          test -n "${CANARY_URL}" || { echo "canary URL not found; aborting before traffic migration"; exit 1; }
          echo "canary: ${CANARY_URL}"
          curl --fail --show-error --silent "${CANARY_URL}/health"

      - name: Migrate traffic after smoke test
        run: >-
          gcloud run services update-traffic yui-agent
          --region asia-northeast1
          --project yui-agent-2026
          --to-latest
          --quiet
